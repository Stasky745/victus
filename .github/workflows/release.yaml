name: release

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  # Builds and scans EACH platform that build-push below will actually push
  # — not just the runner's native arch. A single-platform "release
  # candidate" scanned in isolation would never catch a CVE unique to the
  # arm64 base-image layer, since the pushed multi-platform image used to be
  # built by a completely separate, unscanned step.
  build-scan:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            slug: amd64
          - platform: linux/arm64
            slug: arm64
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      # Same cache scope (keyed by slug) that push below imports from, so
      # push's rebuild of this exact commit is a cache hit on every layer
      # instead of a from-scratch `go mod download` + compile.
      - name: Build image (local, not pushed)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          platforms: ${{ matrix.platform }}
          tags: victus:release-candidate
          cache-from: type=gha,scope=image-${{ matrix.slug }}
          cache-to: type=gha,mode=max,scope=image-${{ matrix.slug }}

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: victus:release-candidate
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  push:
    needs: build-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      # Imports both per-platform caches build-scan just populated for this
      # exact commit — this build should be almost entirely cache hits, not
      # a second from-scratch compile of what was just built and scanned.
      - name: Build and push multi-platform image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=gha,scope=image-amd64
            type=gha,scope=image-arm64
          cache-to: type=gha,mode=max,scope=image-multi
