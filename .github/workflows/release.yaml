name: release

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  # Builds and scans EACH platform that build-push below will actually push
  # — not just the runner's native arch. A single-platform "release
  # candidate" scanned in isolation would never catch a CVE unique to the
  # arm64 base-image layer, since the pushed multi-platform image used to be
  # built by a completely separate, unscanned step.
  build-scan:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform: [linux/amd64, linux/arm64]
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - name: Build image (local, not pushed)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          platforms: ${{ matrix.platform }}
          tags: victus:release-candidate

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: victus:release-candidate
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  push:
    needs: build-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push multi-platform image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
