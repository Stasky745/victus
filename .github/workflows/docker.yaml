name: docker

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      # Same cache scope the release workflow's linux/amd64 leg uses, so a
      # PR merged to main leaves a warm cache behind for the next release.
      - name: Build image (local, not pushed)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: victus:ci
          cache-from: type=gha,scope=image-amd64
          cache-to: type=gha,mode=max,scope=image-amd64

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: victus:ci
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true
